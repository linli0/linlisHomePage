spring:
  application:
    name: coffee-cookies-homepage

  web:
    resources:
      static-locations: file:../frontend/dist/

  # Database Configuration
  datasource:
    url: jdbc:h2:file:./data/homepage_db;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: GMT+8

  # WebClient Configuration
  codec:
    max-in-memory-size: 10MB

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  # Increase timeout for AI streaming responses
  tomcat:
    connection-timeout: 300000 # 5 minutes
    keep-alive-timeout: 300000

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OQ==}
  expiration: 86400000 # 24 hours

# Site Configuration
site:
  password: ${SITE_PASSWORD:admin123}

# Ollama Configuration
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

# Logging
logging:
  level:
    com.coffeecookies.homepage: INFO
    org.springframework.security: WARN
    org.springframework.web.reactive.function.client: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
