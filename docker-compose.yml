# Default stack: FastAPI (SQLite) + nginx frontend. No MySQL / Spring Boot.
# Dev (hot reload): start.bat / ./start.sh dev  → API :8000 + Vite :3000
# Prod-like:        docker compose up -d      → API :8000 + frontend :80

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: coffee-homepage-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/homepage.db
      - JWT_SECRET=${JWT_SECRET:-bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OQ==}
      - AI_DEFAULT_PROVIDER=${AI_DEFAULT_PROVIDER:-ollama}
      - METALPRICE_API_ENABLED=${METALPRICE_API_ENABLED:-false}
      - XIAOMI_ENABLED=${XIAOMI_ENABLED:-false}
    volumes:
      - ./data:/app/data
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coffee-homepage-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - coffee-network
    depends_on:
      api:
        condition: service_healthy

networks:
  coffee-network:
    driver: bridge
