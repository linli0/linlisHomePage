# Preferred: single app container (Spring Boot serves API + static frontend).
# Build frontend into backend static resources before `docker compose up --build`,
# or use the local build commands in README.md.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-homepage-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - JWT_SECRET=${JWT_SECRET}
      - FEATURES_AI_ENABLED=${FEATURES_AI_ENABLED:-false}
      - FEATURES_TWEETS_ENABLED=${FEATURES_TWEETS_ENABLED:-false}
      - FEATURES_QUANT_ENABLED=${FEATURES_QUANT_ENABLED:-false}
      - FEATURES_XIAOMI_ENABLED=${FEATURES_XIAOMI_ENABLED:-false}
      - MYSQL_HOST=${MYSQL_HOST:-}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DB=${MYSQL_DB:-homepage}
      - MYSQL_USER=${MYSQL_USER:-}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
    volumes:
      - ./data:/app/data

  # Optional: enable with `docker compose --profile mysql up -d`
  mysql:
    profiles: ["mysql"]
    image: mysql:8.0
    container_name: coffee-homepage-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123}
      - MYSQL_DATABASE=${MYSQL_DB:-homepage}
      - MYSQL_USER=${MYSQL_USER:-homepage}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-homepage123}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
