version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: coffee-homepage-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/homepage.db
      - JWT_SECRET=${JWT_SECRET:-bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OQ==}
      - METALPRICE_API_ENABLED=${METALPRICE_API_ENABLED:-false}
    volumes:
      - ./data:/app/data
    networks:
      - coffee-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coffee-homepage-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - coffee-network
    depends_on:
      api:
        condition: service_healthy

networks:
  coffee-network:
    driver: bridge
